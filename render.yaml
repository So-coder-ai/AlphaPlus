services:
  - type: web
    name: alphapulse-dashboard
    env: python
    plan: free

    runtime: python-3.11.9   

    buildCommand: |
      python --version
      pip install --upgrade pip
      pip install -r requirements.txt
      chmod +x start.sh

    startCommand: ./start.sh

    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false